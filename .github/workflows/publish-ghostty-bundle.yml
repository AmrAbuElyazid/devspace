name: Publish Ghostty Bundle

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-ghostty-bundle:
    name: Publish Ghostty Bundle
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Zig
        run: brew install zig

      - name: Read bundle metadata
        id: manifest
        run: |
          echo "release_tag=$(node -p \"const manifest=require('./packages/ghostty-electron/libghostty-bundle.json'); manifest.releaseTag\")" >> "$GITHUB_OUTPUT"
          echo "asset_name=$(node -p \"const manifest=require('./packages/ghostty-electron/libghostty-bundle.json'); manifest.assetName\")" >> "$GITHUB_OUTPUT"

      - name: Build pinned Ghostty dependency bundle
        run: bun run --cwd packages/ghostty-electron build-libghostty

      - name: Verify committed checksum manifest matches built bundle
        run: bun run --cwd packages/ghostty-electron refresh-libghostty-checksums && git diff --exit-code packages/ghostty-electron/libghostty-files.sha256

      - name: Package Ghostty dependency bundle
        run: bun run --cwd packages/ghostty-electron bundle-libghostty

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ steps.manifest.outputs.release_tag }}" >/dev/null 2>&1 || \
            gh release create "${{ steps.manifest.outputs.release_tag }}" --title "${{ steps.manifest.outputs.release_tag }}" --notes "Pinned Ghostty dependency bundle"

      - name: Upload Ghostty dependency bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.manifest.outputs.release_tag }}" "packages/ghostty-electron/dist/${{ steps.manifest.outputs.asset_name }}" --clobber
