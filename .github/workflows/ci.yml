name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-linux:
    name: Verify Linux
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run fmt:check

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Check for unused code
        run: bun run knip

      - name: Run tests
        run: bun run test

  verify-macos-native:
    name: Verify macOS Native
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Restore pinned Ghostty dependency bundle
        uses: actions/cache@v4
        with:
          path: packages/ghostty-electron/deps/libghostty
          key: ${{ runner.os }}-libghostty-${{ hashFiles('packages/ghostty-electron/libghostty-bundle.json', 'packages/ghostty-electron/libghostty-files.sha256') }}

      - name: Rebuild native Ghostty bridge
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun run rebuild-native

      - name: Build app
        run: bun run build

      - name: Run tests
        run: bun run test
